<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counter-Strike Speed Test</title>
  <style>
    :root{
      --bg:#07090c;
      --panel:rgba(255,255,255,0.06);
      --line:rgba(255,255,255,0.12);
      --txt:#e9eef7;
      --mut:rgba(233,238,247,0.75);
      --blue:#00b7ff;
      --orange:#ff7a18;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; height:100vh;
      display:flex; align-items:center; justify-content:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--txt);
      background: var(--bg);
      overflow:hidden;
      user-select:none;
    }

    /* CS2-ish background blobs */
    .bg{
      position:fixed; inset:-10vh -10vw;
      pointer-events:none;
      background:
        radial-gradient(380px circle at 18% 20%, rgba(255,122,24,0.55), transparent 60%),
        radial-gradient(460px circle at 78% 60%, rgba(0,183,255,0.45), transparent 62%),
        radial-gradient(260px circle at 65% 18%, rgba(255,122,24,0.28), transparent 60%),
        radial-gradient(240px circle at 28% 72%, rgba(0,183,255,0.22), transparent 62%);
      filter: blur(2px);
      opacity:0.95;
    }

    .card{
      width:min(980px, 95vw);
      height:min(680px, 90vh);
      border-radius:16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.04));
      border: 1px solid var(--line);
      box-shadow: 0 24px 70px rgba(0,0,0,0.55);
      position:relative;
      overflow:hidden;
    }

    /* top HUD */
    header{
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px;
      border-bottom:1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.25);
    }
    .brand{
      display:flex; flex-direction:column; gap:2px;
      letter-spacing:0.2px;
    }
    .brand .title{
      font-weight:900;
      font-size:16px;
      text-transform:uppercase;
    }
    .brand .sub{
      font-size:12px;
      color:var(--mut);
    }

    .stats{
      display:flex; gap:10px; flex-wrap:wrap;
      font-size:13px;
    }
    .pill{
      padding:7px 10px;
      border-radius:999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
    }
    .pill b{ font-weight:900; }
    .pill.accent{
      border-color: rgba(255,122,24,0.35);
      box-shadow: 0 0 0 1px rgba(0,183,255,0.15) inset;
    }

    .arena{
      position:absolute; inset:58px 0 0 0;
      padding:16px;
    }

    /* the target: white circle */
    #target{
      position:absolute;
      width:64px; height:64px;
      border-radius:50%;
      border: 3px solid rgba(0,0,0,0.35);
      background: #ffffff;
      cursor:pointer;
      box-shadow:
        0 14px 30px rgba(0,0,0,0.45),
        0 0 0 3px rgba(255,122,24,0.22),
        0 0 0 6px rgba(0,183,255,0.18);
      transition: transform .06s ease;
      display:none;
    }
    #target:active{ transform: scale(0.96); }

    /* center panel */
    .center{
      position:absolute; inset:58px 0 0 0;
      display:flex; align-items:center; justify-content:center;
      text-align:center; padding:20px;
    }
    .panel{
      max-width:560px;
      padding:22px 18px;
      border-radius:16px;
      background: rgba(0,0,0,0.35);
      border:1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
    }
    .panel h1{
      margin:0 0 10px;
      font-size:28px;
      text-transform:uppercase;
      letter-spacing:0.6px;
    }
    .panel p{
      margin:0 0 16px;
      color:var(--mut);
      line-height:1.35;
    }
    .row{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    .btn2{
      border:1px solid rgba(255,255,255,0.14);
      cursor:pointer;
      font-weight:900;
      padding:12px 14px;
      border-radius:12px;
      color:var(--txt);
      background: rgba(255,255,255,0.08);
      text-transform:uppercase;
      letter-spacing:0.4px;
    }
    .btn2.orange{
      border-color: rgba(255,122,24,0.35);
      box-shadow: 0 0 0 1px rgba(255,122,24,0.18) inset;
    }
    .btn2.blue{
      border-color: rgba(0,183,255,0.35);
      box-shadow: 0 0 0 1px rgba(0,183,255,0.18) inset;
    }
    .small{ font-size:12px; color:rgba(233,238,247,0.65); margin-top:10px; }

    /* tiny scanline vibe */
    .scan{
      position:absolute; inset:0;
      background: repeating-linear-gradient(
        180deg,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 1px,
        transparent 2px,
        transparent 5px
      );
      opacity:0.10;
      pointer-events:none;
      mix-blend-mode: overlay;
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="card">
    <div class="scan"></div>

    <header>
      <div class="brand">
        <div class="title">Counter-Strike Speed Test</div>
        <div class="sub">Click the target as fast as you can (30s)</div>
      </div>

      <div class="stats">
        <div class="pill accent">Hits: <b id="score">0</b></div>
        <div class="pill">Miss: <b id="miss">0</b></div>
        <div class="pill">Best: <b id="best">0</b></div>
        <div class="pill">Time: <b id="time">30</b>s</div>
      </div>
    </header>

    <div class="arena" id="arena">
      <div id="target" aria-label="target"></div>
    </div>

    <div class="center" id="startScreen">
      <div class="panel">
        <h1>Speed test</h1>
        <p>
          Твоя задача: за 30 секунд сделать максимум <b>попаданий</b> по белому кружку.<br>
          В режиме <b>PRO</b> кружок двигается агрессивнее.
        </p>
        <div class="row">
          <button class="btn2 blue" id="startNormal">Start</button>
          <button class="btn2 orange" id="startPro">Start PRO</button>
        </div>
        <div class="small">Подсказка: промах = клик мимо кружка.</div>
      </div>
    </div>
  </div>

  <script>
    const arena = document.getElementById("arena");
    const target = document.getElementById("target");
    const startScreen = document.getElementById("startScreen");

    const scoreEl = document.getElementById("score");
    const missEl  = document.getElementById("miss");
    const bestEl  = document.getElementById("best");
    const timeEl  = document.getElementById("time");

    const BEST_KEY = "cs_speed_best_v1";
    let best = Number(localStorage.getItem(BEST_KEY) || 0);
    bestEl.textContent = best;

    let score = 0, miss = 0, time = 30;
    let timer = null;
    let mode = "normal"; // normal | pro

    function rand(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }

    function placeTarget(){
      const rect = arena.getBoundingClientRect();
      const tw = target.offsetWidth || 64;
      const th = target.offsetHeight || 64;

      const padding = 10;
      const maxX = rect.width  - tw - padding;
      const maxY = rect.height - th - padding;

      const x = rand(padding, Math.max(padding, maxX));
      const y = rand(padding, Math.max(padding, maxY));

      target.style.left = x + "px";
      target.style.top  = y + "px";
    }

    function startGame(selectedMode){
      mode = selectedMode;
      score = 0; miss = 0; time = 30;

      scoreEl.textContent = score;
      missEl.textContent = miss;
      timeEl.textContent = time;

      startScreen.style.display = "none";
      target.style.display = "block";
      placeTarget();

      clearInterval(timer);
      timer = setInterval(() => {
        time--;
        timeEl.textContent = time;
        if(time <= 0){
          endGame();
        }
      }, 1000);
    }

    function endGame(){
      clearInterval(timer);
      target.style.display = "none";
      startScreen.style.display = "flex";

      if(score > best){
        best = score;
        localStorage.setItem(BEST_KEY, best);
        bestEl.textContent = best;
      }

      startScreen.querySelector("h1").textContent = "Result";
      startScreen.querySelector("p").innerHTML =
        `Hits: <b>${score}</b><br>Miss: <b>${miss}</b><br>` +
        (score === best ? "New best! 🏆" : `Best: <b>${best}</b>`);
    }

    // hit
    target.addEventListener("click", (e) => {
      e.stopPropagation();
      score++;
      scoreEl.textContent = score;
      placeTarget();
    });

    // “move away” effect
    target.addEventListener("mouseenter", () => {
      if(target.style.display === "none") return;
      if(mode === "pro") placeTarget();
      else if(Math.random() < 0.35) placeTarget();
    });

    // miss click
    arena.addEventListener("click", () => {
      if(target.style.display === "none") return;
      miss++;
      missEl.textContent = miss;
      if(mode === "pro" && Math.random() < 0.35) placeTarget();
    });

    // start buttons
    document.getElementById("startNormal").addEventListener("click", () => startGame("normal"));
    document.getElementById("startPro").addEventListener("click", () => startGame("pro"));
  </script>
</body>
</html>
